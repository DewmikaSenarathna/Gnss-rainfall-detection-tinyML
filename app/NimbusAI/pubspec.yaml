name: rainfall_monitor_app
description: "NimbusAI rainfall intelligence dashboard."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0

  firebase_core: ^2.0.0
  firebase_database: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/images/app_icon.png
    background_color: "#D9E9F5"
    theme_color: "#0A2239"
  windows:
    generate: true
    image_path: assets/images/app_icon.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/images/app_icon.png
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: assets/images/app_icon.png
  adaptive_icon_foreground: assets/images/app_icon.png
  adaptive_icon_foreground_inset: 0
